<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <title>"instagram_card"</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <main>
    <!--1열-->
    <header class="topbar">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-arrow-left-icon lucide-arrow-left">
        <path d="m12 19-7-7 7-7" />
        <path d="M19 12H5" />
      </svg>
      <span>mukisnotdead</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-bell-icon lucide-bell">
        <path d="M10.268 21a2 2 0 0 0 3.464 0" />
        <path
          d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-ellipsis-vertical-icon lucide-ellipsis-vertical">
        <circle cx="12" cy="12" r="1" />
        <circle cx="12" cy="5" r="1" />
        <circle cx="12" cy="19" r="1" />
      </svg>
    </header>


    <div class="summary">
      <div class="profileImg">
        <img src="profile.jpg" alt="프로필사진">
      </div>
      <div class="info">
        <span class="name">묵사랑[도토리묵]</span>
        <ul class="stats">
          <li>
            <span class="number">103</span>
            <span class="label">게시물</span>
          </li>

          <li>
            <span class="number">1.4만</span>
            <span class="label">팔로워</span>
          </li>

          <li>
            <span class="number">2</span>
            <span class="label">팔로잉</span>
          </li>
        </ul>

      </div>
    </div>

    <!--3열-->
    <p class="description">서울에서 부모님의 도토리묵을 알리고 있습니다.
      저도 서울 매장에서 직접 쑵니다!
      contact: muksarang@gmail.com</p>

    <!--4열-->
    <div class="actions">
      <button type="button" class="primary">follow</button>
      <button type="button">dm</button>
    </div>


  </main>

</body>

</html>
